<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeingInfinity</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Georgia, serif;
    background:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
    position:relative;
}

/* Top Left Dot */
.dot{
    position:absolute;
    top:20px;
    left:20px;
    width:10px;
    height:10px;
    background:#444;
    border-radius:50%;
    position:fixed;
}

/* Top Right */
.top-right{
    position:fixed;
    top:20px;
    right:25px;
    font-size:18px;
    color:#444;
}

/* Heading */
h1{
    font-size:65px;
    margin-bottom:20px;
}

.being{
    color:rgb(241, 31, 101);
}

.infinity{
    color:#000;
}

/* Tagline */
.tagline{
    color:rgb(0, 213, 255);
    font-size:24px;
    margin-bottom:35px;
}

/* Search Box */
.search{
    width:560px;
    margin:auto;
    position:relative;
}

.search-icon{
    position:absolute;
    left:18px;
    top:25px;
    transform:translateY(-50%);
    font-size:22px;
}

.search input{
    width:100%;
    height:52px;
    border:3px solid #555;
    border-radius:35px;
    outline:none;
    font-size:20px;
    padding-left:55px;
    font-family:Georgia, serif;
}

.search input::placeholder{
    color:#555;
}

/* Suggestion Box */
.suggestion-box{
    width:95%;
    margin:0 auto;
    background:white;
    border:1px solid #ccc;
    border-top:none;
    display:none;
    max-height:320px;
    overflow-y:auto;
    text-align:left;
    border-radius:0 0 10px 10px;
}

.item{
    padding:12px 15px;
    font-size:17px;
    cursor:pointer;
    border-bottom:1px solid #eee;
}

.item:last-child{
    border-bottom:none;
}

.item:hover{
    background:#f5f5f5;
}

/* Hover */
.search input:focus{
    border-color:greenyellow;
}

</style>
</head>

<body>

<div class="dot"></div>

<div class="top-right">
    ● online &nbsp; | &nbsp; 🕒 &nbsp; 2025
</div>

<div class="container">

    <h1>
        <span class="being">Being</span><span class="infinity">Infinity</span>
    </h1>

    <p class="tagline">
        One million phrases. Four Algorithms. Prefix Based Auto Suggest.
    </p>

    <div class="search">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Start Typing to search">

        <div class="suggestion-box">
            Suggestion Box
        </div>
    </div>

</div>
<script>
const input = document.querySelector(".search input");
const suggestionBox = document.querySelector(".suggestion-box");

// Hide suggestion box initially
suggestionBox.style.display = "none";

input.addEventListener("input", async () => {

    const query = input.value.trim();

    if(query === ""){
        suggestionBox.innerHTML = "";
        suggestionBox.style.display = "none";
        return;
    }

    const url =
`https://autosuggest-backend.onrender.com/api/autosuggest?q=${encodeURIComponent(query)}&algorithm=trie&weighted=false&limit=10`;

    try{

        const response = await fetch(url);
        const data = await response.json();

        suggestionBox.innerHTML = "";

        if(data.results.length === 0){
            suggestionBox.innerHTML =
            "<div class='item'>No Suggestions Found</div>";
        }
        else{

            data.results.forEach(result=>{

                const item = document.createElement("div");

                item.className = "item";
                item.innerHTML = `
                   
                    ${result.text}
                `;

                item.onclick = () =>{
                    input.value = result.text;
                    suggestionBox.style.display = "none";
                };

                suggestionBox.appendChild(item);

            });

        }

        suggestionBox.style.display = "block";

    }
    catch(error){
        console.error(error);
    }

});
</script>

</body>
</html>
